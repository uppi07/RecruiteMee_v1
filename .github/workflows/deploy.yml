name: Deploy RecruiteMee

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Test Backend
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for syntax errors
        run: node -c server.js

  # Test Frontend
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint || true
      
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://recruitemee-backend.onrender.com

  deploy-notification:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment info
        run: |
          echo "✅ All tests passed!"
          echo ""
          echo "🚀 Deployment Steps:"
          echo "1. Backend: Deploy Server/ to Render"
          echo "2. Frontend: Deploy Client/ to Vercel"
          echo "3. Update VITE_API_URL in Vercel with backend URL"
          echo ""
          echo "See DEPLOY.md for detailed instructions"
