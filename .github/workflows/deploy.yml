name: CI/CD - Docker Compose + EC2

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: recruitemee-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-ci:
    name: Build and Test Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images with Docker Compose
        env:
          NODE_ENV: production
          MONGO_URI: mongodb://mongo:27017/recruitemee
          JWT_SECRET: ci-jwt-secret
          APP_URL: http://localhost:8080
          CLIENT_ORIGINS: http://localhost:8080
          VITE_API_URL: http://localhost:5000
        run: docker compose build --pull

      - name: Start stack and wait for health
        env:
          NODE_ENV: production
          MONGO_URI: mongodb://mongo:27017/recruitemee
          JWT_SECRET: ci-jwt-secret
          APP_URL: http://localhost:8080
          CLIENT_ORIGINS: http://localhost:8080
          VITE_API_URL: http://localhost:5000
        run: docker compose up -d --wait --wait-timeout 180

      - name: Backend smoke test
        run: |
          curl -fsS http://localhost:5000/health | tee /tmp/backend-health.json
          grep -q '"ok":true' /tmp/backend-health.json

      - name: Frontend smoke test
        run: |
          curl -fsS http://localhost:8080 | tee /tmp/frontend-index.html
          grep -qi '<!doctype html>' /tmp/frontend-index.html

      - name: Print running containers
        if: always()
        run: docker compose ps

      - name: Print logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: compose-ci
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 20

    steps:
      - name: Validate required secrets
        id: precheck
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          CLIENT_ORIGINS: ${{ secrets.CLIENT_ORIGINS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -euo pipefail
          required=(EC2_HOST EC2_USER EC2_SSH_KEY MONGO_URI JWT_SECRET APP_URL CLIENT_ORIGINS VITE_API_URL)
          missing=0

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "${EC2_PORT}" ]; then
            echo "port=22" >> "$GITHUB_OUTPUT"
          else
            echo "port=${EC2_PORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (secrets missing)
        if: steps.precheck.outputs.ready != 'true'
        run: echo "Skipping EC2 deploy because required secrets are not configured."

      - name: Deploy on EC2 over SSH
        if: steps.precheck.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.2
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_URL: ${{ secrets.EC2_REPO_URL }}
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          NODE_ENV: production
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          CLIENT_ORIGINS: ${{ secrets.CLIENT_ORIGINS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          USE_GRIDFS: ${{ secrets.USE_GRIDFS }}
          MONGO_DNS_SERVERS: ${{ secrets.MONGO_DNS_SERVERS }}
          MONGO_URI_FALLBACK: ${{ secrets.MONGO_URI_FALLBACK }}
          MONGO_SERVER_SELECTION_TIMEOUT_MS: ${{ secrets.MONGO_SERVER_SELECTION_TIMEOUT_MS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ steps.precheck.outputs.port }}
          envs: REPOSITORY,BRANCH_NAME,REPO_URL,DEPLOY_PATH,NODE_ENV,MONGO_URI,JWT_SECRET,APP_URL,CLIENT_ORIGINS,VITE_API_URL,USE_GRIDFS,MONGO_DNS_SERVERS,MONGO_URI_FALLBACK,MONGO_SERVER_SELECTION_TIMEOUT_MS
          script: |
            set -euo pipefail

            if ! command -v git >/dev/null 2>&1; then
              echo "git is not installed on the EC2 instance"
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on the EC2 instance"
              exit 1
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose plugin is not installed on the EC2 instance"
              exit 1
            fi

            REPO_URL="${REPO_URL:-https://github.com/${REPOSITORY}.git}"
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/recruitemee}"
            USE_GRIDFS="${USE_GRIDFS:-0}"

            mkdir -p "${DEPLOY_PATH}"

            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              git clone --branch "${BRANCH_NAME}" "${REPO_URL}" "${DEPLOY_PATH}"
            else
              cd "${DEPLOY_PATH}"
              git fetch origin "${BRANCH_NAME}" --prune
              git checkout "${BRANCH_NAME}"
              git pull --ff-only origin "${BRANCH_NAME}"
            fi

            cd "${DEPLOY_PATH}"

            {
              echo "NODE_ENV=${NODE_ENV}"
              echo "MONGO_URI=${MONGO_URI}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "APP_URL=${APP_URL}"
              echo "CLIENT_ORIGINS=${CLIENT_ORIGINS}"
              echo "VITE_API_URL=${VITE_API_URL}"
              echo "USE_GRIDFS=${USE_GRIDFS}"
              if [ -n "${MONGO_DNS_SERVERS}" ]; then
                echo "MONGO_DNS_SERVERS=${MONGO_DNS_SERVERS}"
              fi
              if [ -n "${MONGO_URI_FALLBACK}" ]; then
                echo "MONGO_URI_FALLBACK=${MONGO_URI_FALLBACK}"
              fi
              if [ -n "${MONGO_SERVER_SELECTION_TIMEOUT_MS}" ]; then
                echo "MONGO_SERVER_SELECTION_TIMEOUT_MS=${MONGO_SERVER_SELECTION_TIMEOUT_MS}"
              fi
            } > .env

            docker compose down
            docker compose up -d --build --remove-orphans
            docker compose ps
            for i in {1..30}; do
              if curl -fsS http://localhost:5000/health; then
                echo "Backend is healthy"
                exit 0
              fi

              echo "Backend not ready yet... retry $i/30"
              docker compose ps
              sleep 5
            done

            echo "Backend did not become healthy in time"
            docker compose logs backend --no-color --tail=200
            exit 1
